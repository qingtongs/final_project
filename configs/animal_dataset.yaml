# Animal Detection and Counting - Dataset Configuration
# 20 evaluation animal categories

# Train/Val image directories (relative to this file or absolute)
train: ./dataset/images/train
val: ./dataset/images/val
test: ./dataset/images/test

# Number of classes
nc: 20

# Class names - must match evaluation category names exactly
names:
  0: cat
  1: dog
  2: horse
  3: cow
  4: sheep
  5: goat
  6: pig
  7: rabbit
  8: chicken
  9: duck
  10: goose
  11: deer
  12: monkey
  13: fox
  14: wolf
  15: bear
  16: tiger
  17: lion
  18: zebra
  19: giraffe
